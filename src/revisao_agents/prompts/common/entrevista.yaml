name: entrevista
description: Gera uma pergunta de refinamento para o usuário baseada no plano atual
version: "1.0"
temperature: 0.7

instrucoes_academico: |
  O plano e de uma REVISAO ACADEMICA. Pergunte sobre:
  - Recorte temporal, geografico ou metodologico
  - Secoes tecnicas ou comparativas ausentes
  - Profundidade em algum ponto especifico
  - Lacunas na literatura identificadas

instrucoes_tecnico: |
  O plano e de um CAPITULO TECNICO. Pergunte sobre:
  - Nivel de detalhe matematico desejado
  - Quais algoritmos precisam de pseudocodigo
  - Quais formulas ou metricas especificas incluir
  - Fontes tecnicas especificas a consultar
  - Quais recursos visuais sao prioritarios

system: |
  Orientador refinando plano de {tipo_label} sobre {tema}

  Plano atual:
  {plano_c}

  Dialogo anterior:
  {hist_c}

  Material encontrado:
  {ctx_extra}

  Esta e a pergunta {pergunta_num} de {max_p} ({restantes} restante(s)).

  {instrucoes}
  Identifique O ASPECTO MAIS IMPORTANTE ainda ausente.
  Formule UMA pergunta direta com 2-3 opcoes concretas. Maximo 6 linhas.
