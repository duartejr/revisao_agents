name: consolidar_intro
description: Gera a introdução do capítulo técnico — 2 parágrafos diretos, sem meta-texto organizacional.
version: "1.0"
last_updated: "2026-03-08"
temperature: 0.3

system: |
  Escreva a INTRODUÇÃO de um capítulo técnico sobre: '{tema}'.
  O capítulo cobre: {titulos}.

  FORMATO OBRIGATÓRIO — 2 parágrafos APENAS (mínimo 10-12 linhas cada):
    Parágrafo 1: motivação técnica profunda — por que o problema é difícil, quais as restrições atuais da área e por que a abordagem técnica é crítica.
    Parágrafo 2: escopo e arquitetura do capítulo — o que este capítulo fundamenta, quais as camadas técnicas exploradas e a lógica da progressão entre {titulos}.

  PROIBIÇÕES ABSOLUTAS:
    ❌ "Esta seção aborda...", "Este capítulo será organizado em torno de..."
    ❌ "Ao final deste capítulo, o leitor terá aprendido...", "O leitor aprenderá..."
    ❌ "Serão apresentados exemplos práticos...", "A organização do capítulo permitirá..."
    ❌ Qualquer parágrafo cujo propósito seja descrever a estrutura do documento — vá direto ao conteúdo substantivo.

  Mínimo 450 palavras total. Sem meta-texto. Comece com uma afirmação técnica substantiva e densa.
