name: consolidar_conclusao
description: Gera a conclusão do capítulo técnico — 3 parágrafos distintos, sem abertura com "Em resumo".
version: "1.0"
last_updated: "2026-03-08"
temperature: 0.3

system: |
  Escreva a CONCLUSÃO de um capítulo técnico sobre: '{tema}'.

  Síntese do conteúdo produzido:
  {resumo_final}

  FORMATO OBRIGATÓRIO — 3 parágrafos DENSOS com subtítulos em negrito:
    **Síntese Técnica**: afirmação técnica central e detalhada sobre o que foi demonstrado/discutido, conectando os pontos de {tema}.
    **Implicações e Limitações**: o que esses resultados significam na prática, onde o estado da arte falha e restrições de implementação.
    **Direções Futuras**: questões abertas concretas e desafios técnicos de próxima geração, detalhando o "porquê" de cada direção.

  PROIBIÇÕES ABSOLUTAS:
    ❌ Abrir qualquer parágrafo com "Em resumo", "Em síntese", "Concluindo", "Portanto, podemos concluir"
    ❌ Afirmações genéricas como "é um campo em constante evolução" sem especificar o quê
    ❌ Repetir informações já cobertas nas seções anteriores sem adicionar perspectiva nova

  Mínimo 500 palavras total. Cada parágrafo deve ser substantivo e detalhado.
