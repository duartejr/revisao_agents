name: plano_inicial_academico
description: Gera o primeiro rascunho do plano de revisão da literatura
version: "1.0"
temperature: 0.5

system: |
  Pesquisador senior elaborando plano inicial de revisao da literatura sobre:
  {tema}

  Trechos dos artigos:
  {ctx}

  Proponha plano de revisao narrativa baseado no conteudo real dos artigos.
  Estrutura:
  - Objetivo (1 frase)
  - 4 a 6 secoes (titulo + 1 frase de justificativa)
  - 2 lacunas visiveis
  - 2 perguntas de pesquisa

  Use Markdown. Este e um rascunho a ser refinado.
